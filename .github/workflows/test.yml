name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
      # Ensures the local database.yml's "database: test" is overridden.
      # database.yml has hard-coded names; DATABASE_URL takes precedence in Rails 6.1.

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      # package.json pins "node": "18.x" and yarn's --frozen-lockfile enforces it.
      # Bump this alongside engines when modernizing the frontend stack.
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Run RSpec
        run: bundle exec rspec --format progress
