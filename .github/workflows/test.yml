name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
      # Ensures the local database.yml's "database: test" is overridden.
      # database.yml has hard-coded names; DATABASE_URL takes precedence in Rails 6.1.

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:schema:load

      # Tailwind v4's standalone CLI emits app/assets/builds/tailwind.css,
      # which Sprockets serves via the manifest at
      # app/assets/config/manifest.js and the modern layout links via
      # `stylesheet_link_tag "tailwind"`. Without this build the layout
      # raises `Sprockets::Rails::Helper::AssetNotFound` and every page-
      # render spec fails. Production runs the equivalent step
      # transparently because tailwindcss-rails hooks `tailwindcss:build`
      # into `assets:precompile`.
      - name: Build Tailwind CSS
        run: bundle exec rails tailwindcss:build

      - name: Run RSpec
        run: bundle exec rspec --format progress
